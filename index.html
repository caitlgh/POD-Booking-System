<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tent Booking System</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
    }

    /* LOGIN */
    #login-screen {
      padding: 20px;
    }

    #login-screen input {
      padding: 8px;
      width: 260px;
      margin-right: 8px;
    }

    /* APP */
    #app {
      display: none;
      height: 100vh;
    }

    #sidebar {
      width: 220px;
      background: #f4f4f4;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    #people-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .person-chip {
      padding: 8px;
      background: white;
      border: 1px solid #ddd;
      cursor: grab;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    #admin-panel {
      display: none;
      padding: 10px;
      border-top: 1px solid #ddd;
      flex-direction: column;
      gap: 6px;
    }

    #admin-panel input,
    #admin-panel select,
    #admin-panel button {
      padding: 6px;
      font-size: 12px;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #main-header {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
    }

    #mode {
      font-size: 12px;
      color: #555;
    }

    #site {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pod {
      border: 1px solid #ddd;
      background: white;
    }

    .pod-header {
      padding: 8px;
      background: #eee;
      font-size: 12px;
      font-weight: bold;
    }

    .pod-tents {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
    }

    .tent {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 11px;
      min-height: 50px;
      background: #fafafa;
    }

    .tent.drag-over {
      border: 2px dashed #333;
    }

    .slot {
      margin-top: 4px;
    }

    #login-status {
      margin-top: 10px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>Login</h2>

  <input id="email" placeholder="Enter email" />
  <button onclick="sendLoginLink()">Send login link</button>

  <p id="login-status"></p>
</div>

<!-- APP -->
<div id="app">

  <div id="sidebar">
    <div id="sidebar-header">
      <h3>Unassigned</h3>
      <button onclick="toggleAdmin()">Admin</button>
    </div>

    <div id="people-list"></div>

    <div id="admin-panel">
      <input id="new-name" placeholder="Name" />
      <select id="new-type">
        <option value="sharing">Sharing</option>
        <option value="solo">Solo</option>
      </select>
      <button onclick="addPerson()">Add</button>
      <button onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="main">
    <div id="main-header">
      <div>Tent Booking</div>
      <div id="mode"></div>
    </div>

    <div id="site"></div>
  </div>

</div>

<!-- FIREBASE + APP -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getAuth,
  sendSignInLinkToEmail,
  isSignInWithEmailLink,
  signInWithEmailLink
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyCK58...",
  authDomain: "tent-booking-system-d944f.firebaseapp.com",
  projectId: "tent-booking-system-d944f",
  storageBucket: "tent-booking-system-d944f.firebasestorage.app",
  messagingSenderId: "723510809468",
  appId: "1:723510809468:web:df385bc113dc49f9fd8af9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ---------------- STATE ---------------- */

let user = null;
let isAdmin = false;
let dragId = null;

const PODS = 6;
const TENTS = 12;

let people = [
  { id: "p1", name: "Alice", type: "sharing", email: "alice@test.com" },
  { id: "p2", name: "Ben", type: "solo", email: "ben@test.com" }
];

let assignments = {};

/* ---------------- LOGIN ---------------- */

window.sendLoginLink = async function () {
  const email = document.getElementById("email").value;

  const actionCodeSettings = {
    url: window.location.href,
    handleCodeInApp: true
  };

  try {
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    window.localStorage.setItem("email", email);

    document.getElementById("login-status").innerText =
      "Login link sent. Check email.";
  } catch (e) {
    console.error(e);
  }
};

async function completeLogin() {
  if (!isSignInWithEmailLink(auth, window.location.href)) return;

  let email = window.localStorage.getItem("email");
  if (!email) email = prompt("Email");

  const result = await signInWithEmailLink(auth, email, window.location.href);

  user = result.user;

  isAdmin = user.email === "caitlgh@gmail.com";

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";

  render();
}

completeLogin();

/* ---------------- ROLE ---------------- */

function role() {
  return isAdmin ? "Admin" : "User";
}

/* ---------------- MODE ---------------- */

function updateMode() {
  if (!user) return;
  const name = user.email.split("@")[0];
  document.getElementById("mode").textContent =
    `${name} · ${role()}`;
}

/* ---------------- HELPERS ---------------- */

function person(id) {
  return people.find(p => p.id === id);
}

/* ---------------- PERMISSIONS ---------------- */

function canEdit(id) {
  return isAdmin || user.email === person(id)?.email;
}

function canRemove(owner) {
  return isAdmin || user.email === person(owner)?.email;
}

/* ---------------- ASSIGN ---------------- */

window.assign = function (pid, tid) {
  const p = person(pid);
  if (!p) return;

  if (!canEdit(pid)) return;

  const a = assignments[tid] || { slot1: null, slot2: null, owner: null };

  if (!isAdmin && a.slot1) return;

  if (p.type === "sharing") {
    a.slot1 = a.slot2 = p.name;
  } else {
    a.slot1 = p.name;
    a.slot2 = "N/A";
  }

  a.owner = p.id;
  assignments[tid] = a;
  p._tent = tid;

  render();
};

/* ---------------- REMOVE ---------------- */

window.remove = function (owner) {
  if (!canRemove(owner)) return;

  for (const k in assignments) {
    if (assignments[k].owner === owner) {
      delete assignments[k];
    }
  }

  const p = person(owner);
  if (p) delete p._tent;

  render();
};

/* ---------------- RENDER ---------------- */

function render() {
  updateMode();
  renderPeople();
  renderSite();
}

/* ---------------- PEOPLE ---------------- */

function renderPeople() {
  const list = document.getElementById("people-list");
  list.innerHTML = "";

  people.filter(p => !p._tent).forEach(p => {
    const el = document.createElement("div");
    el.className = "person-chip";
    el.draggable = true;

    el.innerHTML = `<span>${p.name}</span><span>${p.type}</span>`;

    el.ondragstart = () => {
      if (!canEdit(p.id)) return;
      dragId = p.id;
    };

    list.appendChild(el);
  });
}

/* ---------------- SITE ---------------- */

function renderSite() {
  const site = document.getElementById("site");
  site.innerHTML = "";

  for (let pod = 1; pod <= PODS; pod++) {
    const podEl = document.createElement("div");
    podEl.className = "pod";

    const header = document.createElement("div");
    header.className = "pod-header";
    header.textContent = "Pod " + pod;

    const grid = document.createElement("div");
    grid.className = "pod-tents";

    for (let t = 1; t <= TENTS; t++) {
      const tid = `${pod}-${t}`;
      const a = assignments[tid];

      const el = document.createElement("div");
      el.className = "tent";

      el.innerHTML = `
        <div>T${t}</div>
        <div>${a?.slot1 || "empty"}
          ${a?.owner ? `<button onclick="remove('${a.owner}')">x</button>` : ""}
        </div>
        <div>${a?.slot2 || ""}</div>
      `;

      el.ondragover = e => {
        if (!dragId) return;
        e.preventDefault();
        el.classList.add("drag-over");
      };

      el.ondragleave = () => el.classList.remove("drag-over");

      el.ondrop = e => {
        e.preventDefault();
        assign(dragId, tid);
      };

      grid.appendChild(el);
    }

    podEl.appendChild(header);
    podEl.appendChild(grid);
    site.appendChild(podEl);
  }
}

/* ---------------- ADMIN ---------------- */

window.toggleAdmin = function () {
  if (!isAdmin) return alert("Admin only");

  const panel = document.getElementById("admin-panel");
  panel.style.display =
    panel.style.display === "flex" ? "none" : "flex";
};

window.addPerson = function () {
  if (!isAdmin) return;

  const name = document.getElementById("new-name").value;
  const type = document.getElementById("new-type").value;

  people.push({
    id: "p" + Date.now(),
    name,
    type
  });

  render();
};

window.clearAll = function () {
  if (!isAdmin) return;

  people.forEach(p => delete p._tent);
  assignments = {};
  render();
};
</script>

</body>
</html>
