<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-sans);
    background: transparent;
  }

  /* APP CONTAINER */
  #app {
    display: flex;
    height: 100vh;
    max-height: 900px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--color-background-secondary);
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
  }

  #sidebar-header {
    padding: 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  #sidebar-header h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #admin-toggle {
    margin-top: 8px;
    font-size: 12px;
    color: var(--color-text-info);
    cursor: pointer;
    background: none;
    border: none;
    text-decoration: underline;
  }

  #people-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .person-chip {
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    font-size: 13px;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  .person-chip:active {
    cursor: grabbing;
    opacity: 0.6;
  }

  .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .badge-sharing {
    background: #E1F5EE;
    color: #0F6E56;
  }

  .badge-solo {
    background: #E6F1FB;
    color: #185FA5;
  }

  /* ADMIN */
  #admin-panel {
    border-top: 0.5px solid var(--color-border-tertiary);
    padding: 10px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  #admin-panel.open {
    display: flex;
  }

  #admin-panel input,
  #admin-panel select,
  #admin-panel button {
    font-size: 12px;
    padding: 6px 8px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
  }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #main-header {
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #main-header h1 {
    font-size: 15px;
    font-weight: 500;
  }

  .legend {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--color-text-secondary);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  #site {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-content: start;
    min-height: 0;
  }

  /* POD */
  .pod {
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: var(--color-background-primary);
  }

  .pod-header {
    padding: 8px 12px;
    background: var(--color-background-secondary);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .pod-tents {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 10px;
  }

  /* TENT */
  .tent {
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 6px;
    min-height: 62px;
    background: #fff;
    transition: 0.15s;
  }

  .tent.available { background: #E1F5EE; border-color: #5DCAA5; }
  .tent.occupied { background: #FAECE7; border-color: #D85A30; }
  .tent.yours { background: #E6F1FB; border-color: #378ADD; }
  .tent.partial { background: #FAEEDA; border-color: #EF9F27; }

  .tent.drag-over {
    border: 2px dashed #333;
    filter: brightness(0.95);
  }

  .tent-id {
    font-size: 10px;
    font-weight: 600;
    color: var(--color-text-secondary);
    margin-bottom: 4px;
  }

  .slot {
    font-size: 11px;
    padding: 2px 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.6);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slot.empty {
    color: var(--color-text-tertiary);
    font-style: italic;
  }

  .slot.na {
    color: var(--color-text-tertiary);
    font-style: italic;
  }

  .remove {
    border: none;
    background: none;
    cursor: pointer;
    opacity: 0.5;
  }

  .remove:hover {
    opacity: 1;
  }

  /* VIEWER */
  #your-name-bar {
    padding: 8px 16px;
    border-top: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    font-size: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #viewer-select {
    font-size: 12px;
    padding: 4px 6px;
  }
</style>

<div id="app">

  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Unassigned</h2>
      <button id="admin-toggle" onclick="toggleAdmin()">Admin panel</button>
    </div>

    <div id="people-list"></div>

    <div id="admin-panel">
      <input id="new-name" placeholder="Name">
      <select id="new-type">
        <option value="sharing">Sharing</option>
        <option value="solo">Solo</option>
      </select>
      <button onclick="addPerson()">Add</button>
      <button onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="main">

    <div id="main-header">
      <h1>Campsite · 6 Pods · 12 Tents</h1>
    </div>

    <div id="site"></div>

    <div id="your-name-bar">
      <span>Viewing as:</span>
      <select id="viewer-select" onchange="render()"></select>
    </div>

  </div>
</div>

<script>
const PODS = 6;
const TENTS = 12;

let people = [
  {id:'p1', name:'Alice', type:'sharing'},
  {id:'p2', name:'Ben', type:'solo'},
  {id:'p3', name:'Cara', type:'sharing'},
];

let assignments = {};
let dragId = null;

function getTentId(p,t){ return `${p}-${t}`; }

function person(id){ return people.find(p=>p.id===id); }

function tentStatus(tid){
  const a = assignments[tid];
  if (!a) return 'available';
  if (a.slot1 && a.slot2) return 'occupied';
  if (a.slot1 || a.slot2) return 'partial';
  return 'available';
}

function assign(pid, tid){
  const p = person(pid);
  if (!p) return;

  const a = assignments[tid] || {slot1:null,slot2:null,owner:null};

  if (p.type === 'sharing') {
    if (a.slot1) return;
    a.slot1 = a.slot2 = p.name;
  } else {
    if (a.slot1) return;
    a.slot1 = p.name;
    a.slot2 = 'N/A';
  }

  a.owner = p.id;
  assignments[tid] = a;
  p._tent = tid;
  render();
}

function remove(owner){
  for (const k in assignments){
    if (assignments[k].owner === owner){
      delete assignments[k];
    }
  }
  const p = person(owner);
  if (p) delete p._tent;
  render();
}

function render(){
  renderPeople();
  renderViewer();
  renderSite();
}

function renderPeople(){
  const list = document.getElementById('people-list');
  list.innerHTML = '';

  people.filter(p=>!p._tent).forEach(p=>{
    const d = document.createElement('div');
    d.className = 'person-chip';
    d.draggable = true;
    d.dataset.id = p.id;

    d.innerHTML = `<span>${p.name}</span>
      <span class="badge ${p.type==='sharing'?'badge-sharing':'badge-solo'}">
      ${p.type}</span>`;

    d.ondragstart = ()=> dragId = p.id;
    list.appendChild(d);
  });
}

function renderViewer(){
  const sel = document.getElementById('viewer-select');
  const cur = sel.value;

  sel.innerHTML = `<option value="">— select —</option>`;

  people.forEach(p=>{
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.name;
    if (p.id === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function renderSite(){
  const site = document.getElementById('site');
  site.innerHTML = '';

  for (let p=1;p<=PODS;p++){
    const pod = document.createElement('div');
    pod.className = 'pod';

    const header = document.createElement('div');
    header.className = 'pod-header';
    header.textContent = `Pod ${p}`;

    const grid = document.createElement('div');
    grid.className = 'pod-tents';

    for (let t=1;t<=TENTS;t++){
      const tid = getTentId(p,t);
      const a = assignments[tid];
      const status = tentStatus(tid);

      const el = document.createElement('div');
      el.className = `tent ${status}`;

      el.innerHTML = `
        <div class="tent-id">T${t}</div>
        <div class="slot ${!a?.slot1?'empty':''}">
          ${a?.slot1 || 'empty'}
          ${a?.owner ? `<button class="remove" onclick="remove('${a.owner}')">✕</button>`:''}
        </div>
        <div class="slot ${!a?.slot2?'na':''}">
          ${a?.slot2 || ''}
        </div>
      `;

      el.ondragover = e=>{
        if (!dragId) return;
        e.preventDefault();
        el.classList.add('drag-over');
      };

      el.ondragleave = ()=> el.classList.remove('drag-over');

      el.ondrop = e=>{
        e.preventDefault();
        el.classList.remove('drag-over');
        assign(dragId, tid);
        dragId = null;
      };

      grid.appendChild(el);
    }

    pod.appendChild(header);
    pod.appendChild(grid);
    site.appendChild(pod);
  }
}

function toggleAdmin(){
  document.getElementById('admin-panel').classList.toggle('open');
}

function addPerson(){
  const name = document.getElementById('new-name').value.trim();
  const type = document.getElementById('new-type').value;
  if (!name) return;

  people.push({
    id:'p'+Date.now(),
    name,
    type
  });

  document.getElementById('new-name').value='';
  render();
}

function clearAll(){
  people.forEach(p=>delete p._tent);
  assignments = {};
  render();
}

render();
</script>
