<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Pad Booking System</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial;
  background: #fafafa;
}

#app {
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 260px;
  background: #f4f4f4;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

#sidebar-header {
  padding: 10px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

#people-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.person-chip {
  background: white;
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}

.person-chip button {
  font-size: 10px;
  padding: 2px 6px;
  cursor: pointer;
}

#admin-login, #admin-panel {
  padding: 10px;
  border-top: 1px solid #ddd;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#admin-panel { display: none; }

input, select, button {
  padding: 6px;
  font-size: 12px;
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#header {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
}

#mode {
  font-size: 12px;
  color: #666;
}

#site {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.pad {
  background: white;
  border: 1px solid #ddd;
}

.pad-header {
  padding: 8px;
  background: #eee;
  font-weight: bold;
}

.pad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 8px;
}

.tent {
  border: 1px solid #ccc;
  padding: 6px;
  min-height: 70px;
  font-size: 11px;
  background: #fafafa;
  position: relative;
}

.tent.booked {
  background: #c9b6ff;
}

.tent.drag-over {
  border: 2px dashed #000;
}

.tent-title {
  font-weight: bold;
  font-size: 10px;
  margin-bottom: 4px;
}

.slot {
  font-size: 10px;
  margin-top: 3px;
}

.remove-btn {
  position: absolute;
  right: 6px;
  top: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  opacity: 0.7;
}

.remove-btn:hover {
  opacity: 1;
}

.export-btn {
  margin-top: 6px;
}
</style>
</head>

<body>

<div id="app">

<div id="sidebar">

  <div id="sidebar-header">Pad Booking System</div>

  <div id="people-list"></div>

  <div id="admin-login">
    <input id="admin-pass" type="password" placeholder="Admin password" />
    <button onclick="unlockAdmin()">Unlock Admin</button>
  </div>

  <div id="admin-panel">
    <div style="font-size:12px;font-weight:bold;">Admin Panel</div>

    <input id="new-name" placeholder="Name" />
    <select id="new-type">
      <option value="sharing">Sharing</option>
      <option value="single">Single</option>
    </select>

    <button onclick="addPerson()">Add Person</button>
    <button onclick="exportExcel()">Export to Excel</button>
    <button onclick="lockAdmin()">Lock Admin</button>
  </div>

</div>

<div id="main">

  <div id="header">
    <div>Pads Overview</div>
    <div id="mode"></div>
  </div>

  <div id="site"></div>

</div>

</div>

<script>

let isAdmin = false;
const ADMIN_PASSWORD = "404044";
let dragId = null;

const PADS = {
  3: { sharing: 6, single: 4 },
  4: { sharing: 4, single: 4 },
  5: { sharing: 4, single: 4 },
  10:{ sharing: 7, single: 7 }
};

let people = [
  { id:"p1", name:"Alice", type:"sharing" },
  { id:"p2", name:"Ben", type:"single" },
  { id:"p3", name:"Cara", type:"sharing" },
  { id:"p4", name:"Dan", type:"single" }
];

let assignments = {};

function person(id){
  return people.find(p => p.id === id);
}

/* ---------------- ADMIN ---------------- */

function unlockAdmin(){
  const pass = document.getElementById("admin-pass").value;

  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
    document.getElementById("admin-login").style.display = "none";
    document.getElementById("admin-panel").style.display = "flex";
    render();
  } else {
    alert("Wrong password");
  }
}

function lockAdmin(){
  isAdmin = false;
  document.getElementById("admin-login").style.display = "flex";
  document.getElementById("admin-panel").style.display = "none";
  render();
}

/* ---------------- PEOPLE ---------------- */

function addPerson(){
  if(!isAdmin) return;

  const name = document.getElementById("new-name").value.trim();
  const type = document.getElementById("new-type").value;

  if(!name) return;

  people.push({
    id: "p" + Date.now(),
    name,
    type
  });

  document.getElementById("new-name").value = "";
  render();
}

function deletePerson(id){
  if(!isAdmin) return;

  for(const k in assignments){
    if(assignments[k].owner === id){
      delete assignments[k];
    }
  }

  people = people.filter(p => p.id !== id);
  render();
}

/* ---------------- ASSIGN ---------------- */

function assign(pid, padKey, slotType, index){
  const p = person(pid);
  if(!p) return;

  if(p.type !== slotType) return;

  const key = `${padKey}-${slotType}-${index}`;
  const a = assignments[key] || { slot1:null, slot2:null };

  if(a.slot1) return;

  if(p.type === "sharing"){
    a.slot1 = p.name;
    a.slot2 = p.name;
  } else {
    a.slot1 = p.name;
    a.slot2 = "N/A";
  }

  a.owner = p.id;
  assignments[key] = a;
  p._slot = key;

  render();
}

function remove(owner){
  for(const k in assignments){
    if(assignments[k].owner === owner){
      delete assignments[k];
    }
  }

  const p = person(owner);
  if(p) delete p._slot;

  render();
}

/* ---------------- EXPORT ---------------- */

function exportExcel(){
  if(!isAdmin) return;

  let csv = "Pad,Type,Tent,Name\n";

  for(const key in assignments){
    const a = assignments[key];
    const [pad, type, index] = key.split("-");
    csv += `${pad},${type},${index},${a.slot1}\n`;
  }

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "pad-bookings.csv";
  a.click();

  URL.revokeObjectURL(url);
}

/* ---------------- RENDER ---------------- */

function render(){
  document.getElementById("mode").textContent =
    isAdmin ? "Admin Mode" : "User Mode";

  renderPeople();
  renderPads();
}

/* ---------------- PEOPLE LIST ---------------- */

function renderPeople(){
  const list = document.getElementById("people-list");
  list.innerHTML = "";

  people.filter(p => !p._slot).forEach(p => {

    const el = document.createElement("div");
    el.className = "person-chip";
    el.draggable = true;

    el.innerHTML = `
      <span>${p.name} (${p.type})</span>
      ${isAdmin ? `<button onclick="deletePerson('${p.id}')">X</button>` : ""}
    `;

    el.ondragstart = () => dragId = p.id;

    list.appendChild(el);
  });
}

/* ---------------- PADS ---------------- */

function renderPads(){
  const site = document.getElementById("site");
  site.innerHTML = "";

  Object.keys(PADS).forEach(padKey => {

    const pad = PADS[padKey];

    const padEl = document.createElement("div");
    padEl.className = "pad";
    padEl.innerHTML = `<div class="pad-header">Pad ${padKey}</div>`;

    const grid = document.createElement("div");
    grid.className = "pad-grid";

    for(let i=1;i<=pad.sharing;i++){
      const key = `${padKey}-sharing-${i}`;
      const a = assignments[key];

      const el = document.createElement("div");
      el.className = "tent " + (a ? "booked" : "");

      el.innerHTML = `
        <button class="remove-btn" onclick="remove('${a?.owner || ""}')">×</button>
        <div class="tent-title">Tent ${i} - Sharing</div>
        <div class="slot">${a?.slot1 || "empty"}</div>
      `;

      el.ondragover = e => {
        const p = person(dragId);
        if(!p || p.type !== "sharing") return;
        e.preventDefault();
        el.classList.add("drag-over");
      };

      el.ondragleave = () => el.classList.remove("drag-over");

      el.ondrop = e => {
        e.preventDefault();
        el.classList.remove("drag-over");
        const p = person(dragId);
        if(!p || p.type !== "sharing") return;
        assign(dragId, padKey, "sharing", i);
      };

      grid.appendChild(el);
    }

    for(let i=1;i<=pad.single;i++){
      const key = `${padKey}-single-${i}`;
      const a = assignments[key];

      const el = document.createElement("div");
      el.className = "tent " + (a ? "booked" : "");

      el.innerHTML = `
        <button class="remove-btn" onclick="remove('${a?.owner || ""}')">×</button>
        <div class="tent-title">Tent ${i} - Single</div>
        <div class="slot">${a?.slot1 || "empty"}</div>
      `;

      el.ondragover = e => {
        const p = person(dragId);
        if(!p || p.type !== "single") return;
        e.preventDefault();
        el.classList.add("drag-over");
      };

      el.ondragleave = () => el.classList.remove("drag-over");

      el.ondrop = e => {
        e.preventDefault();
        el.classList.remove("drag-over");
        const p = person(dragId);
        if(!p || p.type !== "single") return;
        assign(dragId, padKey, "single", i);
      };

      grid.appendChild(el);
    }

    padEl.appendChild(grid);
    site.appendChild(padEl);
  });
}

render();

</script>

</body>
</html>
