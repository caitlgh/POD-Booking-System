<div id="login-screen" style="padding:20px;">
  <h2>Login</h2>

  <input id="email" placeholder="Enter email" style="padding:8px;width:260px;">
  <button onclick="sendLoginLink()">Send login link</button>

  <p id="login-status"></p>
</div>

<div id="app" style="display:none;">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Unassigned</h2>
      <button onclick="toggleAdminPanel()">Admin panel</button>
    </div>

    <div id="people-list"></div>

    <div id="admin-panel" style="display:none;">
      <input id="new-name" placeholder="Name">
      <select id="new-type">
        <option value="sharing">Sharing</option>
        <option value="solo">Solo</option>
      </select>
      <button onclick="addPerson()">Add</button>
      <button onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <div id="main">
    <div id="main-header">
      <h1>Campsite</h1>
      <div id="mode"></div>
    </div>

    <div id="site"></div>
  </div>
</div>
