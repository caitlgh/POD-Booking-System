
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: transparent; }
  #app { display: flex; gap: 0; height: 680px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }

  /* SIDEBAR */
  #sidebar { width: 220px; min-width: 220px; background: var(--color-background-secondary); border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; }
  #sidebar-header { padding: 14px 14px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  #sidebar-header h2 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
  #admin-toggle { margin-top: 8px; font-size: 12px; color: var(--color-text-info); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }

  #people-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  #people-list:empty::after { content: 'Everyone is placed!'; font-size: 12px; color: var(--color-text-tertiary); text-align: center; padding: 16px; display: block; }

  .person-chip { padding: 7px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 13px; cursor: grab; display: flex; align-items: center; gap: 6px; user-select: none; transition: opacity 0.15s; }
  .person-chip:active { cursor: grabbing; opacity: 0.6; }
  .person-chip .badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: 500; }
  .badge-sharing { background: #E1F5EE; color: #0F6E56; }
  .badge-solo { background: #E6F1FB; color: #185FA5; }

  /* ADMIN PANEL */
  #admin-panel { border-top: 0.5px solid var(--color-border-tertiary); padding: 10px; display: none; flex-direction: column; gap: 6px; }
  #admin-panel.open { display: flex; }
  #admin-panel input, #admin-panel select { font-size: 12px; padding: 5px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); width: 100%; }
  #admin-panel button { font-size: 12px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  #admin-panel button:hover { background: var(--color-background-secondary); }

  /* MAIN AREA */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #main-header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; }
  #main-header h1 { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .legend { display: flex; gap: 12px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-available { background: #9FE1CB; border: 1px solid #1D9E75; }
  .dot-occupied { background: #F5C4B3; border: 1px solid #D85A30; }
  .dot-yours { background: #B5D4F4; border: 1px solid #378ADD; }
  .dot-partial { background: #FAC775; border: 1px solid #BA7517; }

  #site { flex: 1; overflow-y: auto; padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; }

  /* POD */
  .pod { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .pod-header { padding: 7px 12px; background: var(--color-background-secondary); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
  .pod-tents { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 8px; }

  /* TENT */
  .tent { border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); padding: 5px; cursor: default; transition: border-color 0.15s, background 0.15s; min-height: 58px; position: relative; }
  .tent.available { background: #E1F5EE; border-color: #5DCAA5; }
  .tent.occupied { background: #FAECE7; border-color: #D85A30; }
  .tent.yours { background: #E6F1FB; border-color: #378ADD; }
  .tent.partial { background: #FAEEDA; border-color: #EF9F27; }
  .tent.drag-over { border-style: dashed; border-width: 2px; filter: brightness(0.93); }
  .tent-id { font-size: 9px; color: var(--color-text-tertiary); margin-bottom: 3px; font-weight: 500; letter-spacing: 0.05em; }
  .tent-slots { display: flex; flex-direction: column; gap: 2px; }
  .slot { font-size: 10px; padding: 2px 4px; border-radius: 3px; background: rgba(255,255,255,0.55); color: var(--color-text-primary); min-height: 16px; line-height: 1.3; display: flex; align-items: center; justify-content: space-between; }
  .slot.empty-slot { color: var(--color-text-tertiary); font-style: italic; }
  .slot.na-slot { color: var(--color-text-tertiary); font-style: italic; }
  .slot-remove { font-size: 9px; cursor: pointer; opacity: 0.5; border: none; background: none; color: inherit; padding: 0 0 0 3px; line-height: 1; }
  .slot-remove:hover { opacity: 1; }

  /* "YOUR NAME" selector */
  #your-name-bar { padding: 8px 16px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); }
  #your-name-bar select { font-size: 12px; padding: 4px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }

  .dragging { opacity: 0.4; }
</style>

<h2 class="sr-only">Tent booking system — 6 pods each with 12 tents, drag names from the sidebar to assign tents.</h2>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Unassigned</h2>
      <button id="admin-toggle" onclick="toggleAdmin()">Admin panel</button>
    </div>
    <div id="people-list"></div>
    <div id="admin-panel">
      <input id="new-name" type="text" placeholder="Name" />
      <select id="new-type">
        <option value="sharing">Sharing (fills both slots)</option>
        <option value="solo">Solo (1 slot + N/A)</option>
      </select>
      <button onclick="addPerson()">Add person</button>
      <button onclick="clearAll()" style="color:var(--color-text-danger)">Clear all assignments</button>
    </div>
  </div>
  <div id="main">
    <div id="main-header">
      <h1>Campsite — 6 Pods · 12 Tents Each</h1>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot dot-available"></div>Available</div>
        <div class="legend-item"><div class="legend-dot dot-partial"></div>1 slot free</div>
        <div class="legend-item"><div class="legend-dot dot-occupied"></div>Full</div>
        <div class="legend-item"><div class="legend-dot dot-yours"></div>Yours</div>
      </div>
    </div>
    <div id="site"></div>
    <div id="your-name-bar">
      <span>Viewing as:</span>
      <select id="viewer-select" onchange="render()"><option value="">— select your name —</option></select>
    </div>
  </div>
</div>

<script>
const PODS = 6, TENTS = 12;
let people = [
  {id:'p1', name:'Alice', type:'sharing'},
  {id:'p2', name:'Ben', type:'solo'},
  {id:'p3', name:'Cara', type:'sharing'},
  {id:'p4', name:'Dan', type:'solo'},
  {id:'p5', name:'Eve', type:'sharing'},
  {id:'p6', name:'Finn', type:'solo'},
];
let assignments = {};
let dragId = null;

function getTentId(pod, tent) { return `${pod}-${tent}`; }

function personById(id) { return people.find(p => p.id === id); }

function tentStatus(tid) {
  const a = assignments[tid];
  const viewer = document.getElementById('viewer-select')?.value;
  if (!a) return 'available';
  const occupants = [a.slot1, a.slot2].filter(Boolean);
  const isYours = viewer && occupants.includes(viewer);
  if (isYours) return 'yours';
  if (a.slot1 && a.slot2) return 'occupied';
  if (a.slot1 || a.slot2) return 'partial';
  return 'available';
}

function assignPerson(personId, tentId) {
  const p = personById(personId);
  if (!p) return;
  const a = assignments[tentId] || {slot1: null, slot2: null, owner: null};
  if (p.type === 'sharing') {
    if (a.slot1 || a.slot2) return;
    a.slot1 = p.name; a.slot2 = p.name; a.owner = p.id;
    assignments[tentId] = a;
    p._tent = tentId;
  } else {
    if (a.slot1) return;
    a.slot1 = p.name; a.slot2 = 'N/A'; a.owner = p.id;
    assignments[tentId] = a;
    p._tent = tentId;
  }
  render();
}

function removeFromTent(personId) {
  for (const tid in assignments) {
    if (assignments[tid].owner === personId) {
      delete assignments[tid];
      const p = personById(personId);
      if (p) delete p._tent;
    }
  }
  render();
}

function render() {
  renderSidebar();
  renderSite();
  renderViewer();
}

function renderViewer() {
  const sel = document.getElementById('viewer-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— select your name —</option>';
  people.forEach(p => {
    const o = document.createElement('option');
    o.value = p.name; o.textContent = p.name;
    if (p.name === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function renderSidebar() {
  const list = document.getElementById('people-list');
  list.innerHTML = '';
  const unassigned = people.filter(p => !p._tent);
  unassigned.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'person-chip';
    chip.draggable = true;
    chip.dataset.id = p.id;
    chip.innerHTML = `<span style="flex:1">${p.name}</span><span class="badge ${p.type === 'sharing' ? 'badge-sharing' : 'badge-solo'}">${p.type === 'sharing' ? 'pair' : 'solo'}</span>`;
    chip.addEventListener('dragstart', e => { dragId = p.id; chip.classList.add('dragging'); });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    list.appendChild(chip);
  });
}

function renderSite() {
  const site = document.getElementById('site');
  site.innerHTML = '';
  for (let pod = 1; pod <= PODS; pod++) {
    const podEl = document.createElement('div');
    podEl.className = 'pod';
    const header = document.createElement('div');
    header.className = 'pod-header';
    header.textContent = `Pod ${pod}`;
    podEl.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'pod-tents';
    for (let t = 1; t <= TENTS; t++) {
      const tid = getTentId(pod, t);
      const status = tentStatus(tid);
      const a = assignments[tid];
      const tentEl = document.createElement('div');
      tentEl.className = `tent ${status}`;
      tentEl.dataset.tid = tid;

      const s1 = a?.slot1; const s2 = a?.slot2;
      tentEl.innerHTML = `
        <div class="tent-id">T${t}</div>
        <div class="tent-slots">
          <div class="slot ${!s1 ? 'empty-slot' : ''}">${s1 ? `<span>${s1}</span>${a.owner ? `<button class="slot-remove" onclick="removeFromTent('${a.owner}')">✕</button>` : ''}` : 'empty'}</div>
          <div class="slot ${!s2 ? 'empty-slot' : (s2 === 'N/A' ? 'na-slot' : '')}">${s2 || (s1 ? '' : 'empty')}</div>
        </div>`;

      tentEl.addEventListener('dragover', e => {
        const p = personById(dragId);
        if (!p) return;
        const a2 = assignments[tid];
        const canDrop = !a2 || (!a2.slot1 && p.type === 'sharing') || (!a2.slot1 && p.type === 'solo');
        if (!canDrop) return;
        e.preventDefault();
        tentEl.classList.add('drag-over');
      });
      tentEl.addEventListener('dragleave', () => tentEl.classList.remove('drag-over'));
      tentEl.addEventListener('drop', e => {
        e.preventDefault();
        tentEl.classList.remove('drag-over');
        if (dragId) { assignPerson(dragId, tid); dragId = null; }
      });

      grid.appendChild(tentEl);
    }
    podEl.appendChild(grid);
    site.appendChild(podEl);
  }
}

function toggleAdmin() {
  const p = document.getElementById('admin-panel');
  p.classList.toggle('open');
}

function addPerson() {
  const name = document.getElementById('new-name').value.trim();
  const type = document.getElementById('new-type').value;
  if (!name) return;
  people.push({ id: 'p' + Date.now(), name, type });
  document.getElementById('new-name').value = '';
  render();
}

function clearAll() {
  people.forEach(p => delete p._tent);
  assignments = {};
  render();
}

render();
</script>
