<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tent Booking System</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    #sidebar {
      width: 240px;
      background: #f4f4f4;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
    }

    #people-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .person-chip {
      padding: 8px;
      background: white;
      border: 1px solid #ddd;
      cursor: grab;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    #admin-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    #admin-panel input,
    #admin-panel select,
    #admin-panel button {
      padding: 6px;
      font-size: 12px;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #main-header {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
    }

    #mode {
      font-size: 12px;
      color: #666;
    }

    #site {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pod {
      border: 1px solid #ddd;
      background: white;
    }

    .pod-header {
      padding: 8px;
      background: #eee;
      font-weight: bold;
      font-size: 12px;
    }

    .pod-tents {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
    }

    .tent {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 11px;
      min-height: 50px;
      background: #fafafa;
    }

    .tent.drag-over {
      border: 2px dashed #000;
    }
  </style>
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div id="sidebar-header">
      Campsite System
    </div>

    <div id="people-list"></div>

    <div id="admin-panel">
      <div style="font-size:12px;font-weight:bold;">Admin Panel</div>

      <input id="new-name" placeholder="Name" />
      <select id="new-type">
        <option value="sharing">Sharing</option>
        <option value="solo">Solo</option>
      </select>

      <button onclick="addPerson()">Add Person</button>
      <button onclick="clearAll()">Clear All</button>
    </div>

  </div>

  <!-- MAIN -->
  <div id="main">

    <div id="main-header">
      <div>Tent Booking System</div>
      <div id="mode"></div>
    </div>

    <div id="site"></div>

  </div>

</div>

<script>
/* ---------------- STATE ---------------- */

const PODS = 6;
const TENTS = 12;

let isAdmin = true; // 👈 CHANGE THIS: true = Caitlin (admin), false = user

let dragId = null;

let people = [
  { id: "p1", name: "Alice", type: "sharing" },
  { id: "p2", name: "Ben", type: "solo" },
  { id: "p3", name: "Cara", type: "sharing" }
];

let assignments = {};

/* ---------------- HELPERS ---------------- */

function person(id) {
  return people.find(p => p.id === id);
}

/* ---------------- ADMIN DISPLAY ---------------- */

function updateMode() {
  document.getElementById("mode").textContent =
    isAdmin ? "Caitlin · Admin" : "User";
}

/* ---------------- ASSIGN ---------------- */

function assign(pid, tid) {
  const p = person(pid);
  if (!p) return;

  const a = assignments[tid] || { slot1: null, slot2: null, owner: null };

  if (!isAdmin && a.slot1) return;

  if (p.type === "sharing") {
    a.slot1 = a.slot2 = p.name;
  } else {
    a.slot1 = p.name;
    a.slot2 = "N/A";
  }

  a.owner = p.id;
  assignments[tid] = a;
  p._tent = tid;

  render();
}

/* ---------------- REMOVE ---------------- */

function remove(owner) {
  const p = person(owner);

  for (const k in assignments) {
    if (assignments[k].owner === owner) {
      delete assignments[k];
    }
  }

  if (p) delete p._tent;

  render();
}

/* ---------------- RENDER ---------------- */

function render() {
  updateMode();
  renderPeople();
  renderSite();
}

/* ---------------- PEOPLE ---------------- */

function renderPeople() {
  const list = document.getElementById("people-list");
  list.innerHTML = "";

  people.filter(p => !p._tent).forEach(p => {
    const el = document.createElement("div");
    el.className = "person-chip";
    el.draggable = true;

    el.innerHTML = `<span>${p.name}</span><span>${p.type}</span>`;

    el.ondragstart = () => dragId = p.id;

    list.appendChild(el);
  });
}

/* ---------------- SITE ---------------- */

function renderSite() {
  const site = document.getElementById("site");
  site.innerHTML = "";

  for (let pod = 1; pod <= PODS; pod++) {
    const podEl = document.createElement("div");
    podEl.className = "pod";

    const header = document.createElement("div");
    header.className = "pod-header";
    header.textContent = "Pod " + pod;

    const grid = document.createElement("div");
    grid.className = "pod-tents";

    for (let t = 1; t <= TENTS; t++) {
      const tid = `${pod}-${t}`;
      const a = assignments[tid];

      const el = document.createElement("div");
      el.className = "tent";

      el.innerHTML = `
        <div><strong>T${t}</strong></div>
        <div>${a?.slot1 || "empty"}</div>
        <div>${a?.slot2 || ""}</div>
        ${a?.owner ? `<button onclick="remove('${a.owner}')">Remove</button>` : ""}
      `;

      el.ondragover = e => {
        if (!dragId) return;
        e.preventDefault();
        el.classList.add("drag-over");
      };

      el.ondragleave = () => el.classList.remove("drag-over");

      el.ondrop = e => {
        e.preventDefault();
        assign(dragId, tid);
      };

      grid.appendChild(el);
    }

    podEl.appendChild(header);
    podEl.appendChild(grid);
    site.appendChild(podEl);
  }
}

/* ---------------- ADMIN ACTIONS ---------------- */

function addPerson() {
  if (!isAdmin) return;

  const name = document.getElementById("new-name").value;
  const type = document.getElementById("new-type").value;

  people.push({
    id: "p" + Date.now(),
    name,
    type
  });

  render();
}

function clearAll() {
  if (!isAdmin) return;

  people.forEach(p => delete p._tent);
  assignments = {};

  render();
}

/* ---------------- INIT ---------------- */

render();

</script>

</body>
</html>
