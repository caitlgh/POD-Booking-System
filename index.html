<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Pad Booking System</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial;
  background: #fafafa;
  height: 100vh;
  overflow: hidden; /* IMPORTANT: scroll inside app instead */
}

/* WHOLE APP SCROLL CONTAINER */
#app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
#sidebar {
  width: 300px;
  background: #f4f4f4;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

#help-btn {
  display: block;
  margin: 10px;
  padding: 8px;
  text-align: center;
  background: #25D366;
  color: white;
  text-decoration: none;
  font-weight: bold;
  border-radius: 6px;
  font-size: 13px;
}

#instructions {
  padding: 10px;
  font-size: 12px;
  color: #333;
  line-height: 1.4;
  border-bottom: 1px solid #ddd;
}

/* SCROLL FIX FOR PEOPLE LIST */
#people-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.person-chip {
  background: white;
  border: 1px solid #ddd;
  padding: 10px;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ADMIN */
#admin-login, #admin-panel {
  padding: 10px;
  border-top: 1px solid #ddd;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#admin-panel { display: none; }

input, select, button {
  padding: 8px;
  font-size: 13px;
}

/* RIGHT SIDE SCROLL WRAPPER (IMPORTANT FIX) */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto; /* THIS enables scrolling for image + pads */
}

/* IMAGE FIXED HEIGHT (5cm ≈ 190px) */
#hero-image {
  width: 100%;
  height: 190px;
  object-fit: cover;
  display: block;
  border-bottom: 1px solid #ddd;
}

/* HEADER */
#header {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#mode {
  font-size: 12px;
  color: #666;
}

/* PADS GRID */
#site {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

/* PAD */
.pad {
  background: white;
  border: 1px solid #ddd;
}

.pad-header {
  padding: 10px;
  background: #eee;
  font-weight: bold;
  font-size: 14px;
}

/* TENTS */
.pad-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.tent {
  border: 1px solid #ccc;
  padding: 10px;
  min-height: 90px;
  font-size: 13px;
  background: #fafafa;
  position: relative;
}

.tent.booked {
  background: #c9b6ff;
}

.tent.drag-over {
  border: 2px dashed #000;
}

.tent-title {
  font-weight: bold;
  font-size: 12px;
  margin-bottom: 6px;
}

.slot {
  font-size: 12px;
  margin-top: 6px;
}

.remove-btn {
  position: absolute;
  right: 6px;
  top: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.7;
}

.remove-btn:hover {
  opacity: 1;
}
</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">

  <a id="help-btn" href="https://wa.me/1XXXXXXXXXX" target="_blank">
    Help / WhatsApp Support
  </a>

  <div id="instructions">
    Drag and drop your name into the tent that you would like to book. Sharing / Single is assigned to you according to the ticket that you purchased.
  </div>

  <div id="people-list"></div>

  <div id="admin-login">
    <input id="admin-pass" type="password" placeholder="Admin password" />
    <button onclick="unlockAdmin()">Unlock Admin</button>
  </div>

  <div id="admin-panel">
    <input id="new-name" placeholder="Name" />
    <select id="new-type">
      <option value="sharing">Sharing</option>
      <option value="single">Single</option>
    </select>

    <button onclick="addPerson()">Add Person</button>
    <button onclick="lockAdmin()">Lock Admin</button>
  </div>

</div>

<!-- MAIN SCROLL AREA -->
<div id="main">

  <img id="hero-image" src="https://i.ibb.co/YsbpFqq/image.jpg" />

  <div id="header">
    <div>Pad Overview</div>
    <div id="mode"></div>
  </div>

  <div id="site"></div>

</div>

</div>

<script>

let isAdmin = false;
const ADMIN_PASSWORD = "404044";
let dragId = null;

const PADS = {
  3: { sharing: 6, single: 4 },
  4: { sharing: 4, single: 4 },
  5: { sharing: 4, single: 4 },
  10:{ sharing: 7, single: 7 }
};

let people = [
  { id:"p1", name:"Alice", type:"sharing" },
  { id:"p2", name:"Ben", type:"single" },
  { id:"p3", name:"Cara", type:"sharing" },
  { id:"p4", name:"Dan", type:"single" }
];

let assignments = {};

function person(id){
  return people.find(p => p.id === id);
}

function unlockAdmin(){
  const pass = document.getElementById("admin-pass").value;

  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
    document.getElementById("admin-login").style.display = "none";
    document.getElementById("admin-panel").style.display = "flex";
    render();
  } else {
    alert("Wrong password");
  }
}

function lockAdmin(){
  isAdmin = false;
  document.getElementById("admin-login").style.display = "flex";
  document.getElementById("admin-panel").style.display = "none";
  render();
}

function addPerson(){
  if(!isAdmin) return;

  const name = document.getElementById("new-name").value.trim();
  const type = document.getElementById("new-type").value;
  if(!name) return;

  people.push({
    id: "p" + Date.now(),
    name,
    type
  });

  document.getElementById("new-name").value = "";
  render();
}

function deletePerson(id){
  if(!isAdmin) return;

  for(const k in assignments){
    if(assignments[k].owner === id){
      delete assignments[k];
    }
  }

  people = people.filter(p => p.id !== id);
  render();
}

function assign(pid, padKey, slotType, index){
  const p = person(pid);
  if(!p) return;
  if(p.type !== slotType) return;

  const key = `${padKey}-${slotType}-${index}`;
  const a = assignments[key] || { slot1:null, slot2:null };

  if(a.slot1) return;

  if(p.type === "sharing"){
    a.slot1 = p.name;
    a.slot2 = p.name;
  } else {
    a.slot1 = p.name;
    a.slot2 = "N/A";
  }

  a.owner = p.id;
  assignments[key] = a;
  p._slot = key;

  render();
}

function remove(owner){
  for(const k in assignments){
    if(assignments[k].owner === owner){
      delete assignments[k];
    }
  }

  const p = person(owner);
  if(p) delete p._slot;

  render();
}

function render(){
  document.getElementById("mode").textContent =
    isAdmin ? "Admin Mode" : "User Mode";

  renderPeople();
  renderPads();
}

function renderPeople(){
  const list = document.getElementById("people-list");
  list.innerHTML = "";

  people.filter(p => !p._slot).forEach(p => {

    const el = document.createElement("div");
    el.className = "person-chip";
    el.draggable = true;

    el.innerHTML = `
      <span>${p.name} (${p.type})</span>
      ${isAdmin ? `<button onclick="deletePerson('${p.id}')">X</button>` : ""}
    `;

    el.ondragstart = () => dragId = p.id;
    list.appendChild(el);
  });
}

function renderPads(){
  const site = document.getElementById("site");
  site.innerHTML = "";

  Object.keys(PADS).forEach(padKey => {

    const pad = PADS[padKey];

    const padEl = document.createElement("div");
    padEl.className = "pad";
    padEl.innerHTML = `<div class="pad-header">Pad ${padKey}</div>`;

    const grid = document.createElement("div");
    grid.className = "pad-grid";

    for(let i=1;i<=pad.sharing;i++){
      const key = `${padKey}-sharing-${i}`;
      const a = assignments[key];

      const el = document.createElement("div");
      el.className = "tent " + (a ? "booked" : "");

      el.innerHTML = `
        <button class="remove-btn" onclick="remove('${a?.owner || ""}')">×</button>
        <div class="tent-title">Tent ${i} - Sharing</div>
        <div class="slot">${a?.slot1 || "empty"}</div>
      `;

      el.ondragover = e => {
        const p = person(dragId);
        if(!p || p.type !== "sharing") return;
        e.preventDefault();
        el.classList.add("drag-over");
      };

      el.ondragleave = () => el.classList.remove("drag-over");

      el.ondrop = e => {
        e.preventDefault();
        el.classList.remove("drag-over");
        const p = person(dragId);
        if(!p || p.type !== "sharing") return;
        assign(dragId, padKey, "sharing", i);
      };

      grid.appendChild(el);
    }

    for(let i=1;i<=pad.single;i++){
      const key = `${padKey}-single-${i}`;
      const a = assignments[key];

      const el = document.createElement("div");
      el.className = "tent " + (a ? "booked" : "");

      el.innerHTML = `
        <button class="remove-btn" onclick="remove('${a?.owner || ""}')">×</button>
        <div class="tent-title">Tent ${i} - Single</div>
        <div class="slot">${a?.slot1 || "empty"}</div>
      `;

      el.ondragover = e => {
        const p = person(dragId);
        if(!p || p.type !== "single") return;
        e.preventDefault();
        el.classList.add("drag-over");
      };

      el.ondragleave = () => el.classList.remove("drag-over");

      el.ondrop = e => {
        e.preventDefault();
        el.classList.remove("drag-over");
        const p = person(dragId);
        if(!p || p.type !== "single") return;
        assign(dragId, padKey, "single", i);
      };

      grid.appendChild(el);
    }

    padEl.appendChild(grid);
    site.appendChild(padEl);
  });
}

render();

</script>

</body>
</html>
